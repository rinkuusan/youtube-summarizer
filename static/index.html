<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="YouTube動画の文字起こし・要約をワンクリックで" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%237c6cff'/><polygon points='38,25 78,50 38,75' fill='white'/></svg>" />
  <title>YouTube Summarizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0b10;
      --surface:   #16161e;
      --surface2:  #1e1e2a;
      --border:    #2a2a3a;
      --accent:    #7c6cff;
      --accent-h:  #9b8fff;
      --accent-g:  linear-gradient(135deg, #7c6cff 0%, #b18cff 100%);
      --text:      #eaeaf0;
      --text-dim:  #7a7a8e;
      --success:   #4ade80;
      --error:     #f87171;
      --radius:    16px;
      --font:      'Inter', system-ui, -apple-system, sans-serif;
    }

    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ===== Header ===== */
    header {
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent-g);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    header h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: var(--accent-g);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--text-dim);
      margin-top: 0.3rem;
      font-size: 0.85rem;
    }

    /* ===== Card ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    /* ===== Source Tabs ===== */
    .source-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.15rem;
    }
    .source-tab {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .source-tab.active {
      color: var(--accent-h);
      border-bottom-color: var(--accent);
    }

    /* ===== URL Panel ===== */
    #urlPanel input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #urlPanel input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,108,255,0.15);
    }
    #urlPanel input::placeholder { color: var(--text-dim); }

    /* ===== File Panel ===== */
    #filePanel { display: none; flex-direction: column; gap: 0.6rem; }
    #filePanel.active { display: flex; }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124,108,255,0.05);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone-icon { font-size: 2rem; margin-bottom: 0.4rem; }
    .drop-zone-label { font-size: 0.88rem; color: var(--text-dim); pointer-events: none; }
    .drop-zone-label strong { color: var(--text); }

    #fileInfo {
      display: none; align-items: center; gap: 0.6rem;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 0.9rem; font-size: 0.85rem;
    }
    #fileInfo.visible { display: flex; }
    #fileInfo .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #fileInfo .file-size { color: var(--text-dim); }
    #fileInfo .file-clear {
      background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; padding: 0 0.2rem;
    }
    #fileInfo .file-clear:hover { color: var(--error); }

    /* ===== Options Row ===== */
    .options-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .seg-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      flex: 1;
      min-width: 160px;
    }
    .seg-group label {
      flex: 1;
      text-align: center;
      cursor: pointer;
    }
    .seg-group label input[type="radio"] { display: none; }
    .seg-group label span {
      display: block;
      padding: 0.5rem 0.6rem;
      font-size: 0.82rem;
      color: var(--text-dim);
      background: var(--bg);
      transition: all 0.15s;
      user-select: none;
      font-weight: 500;
    }
    .seg-group label:not(:last-child) span { border-right: 1px solid var(--border); }
    .seg-group label input[type="radio"]:checked + span {
      background: var(--accent);
      color: #fff;
    }

    /* ===== API Key ===== */
    .api-key-section {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .api-key-section input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .api-key-section input:focus { border-color: var(--accent); }
    .api-key-hint {
      font-size: 0.72rem;
      color: var(--text-dim);
      padding-left: 0.25rem;
    }

    /* ===== Submit Button ===== */
    button#submitBtn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent-g);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    button#submitBtn:hover:not(:disabled) { opacity: 0.9; }
    button#submitBtn:active:not(:disabled) { transform: scale(0.98); }
    button#submitBtn:disabled {
      background: var(--surface2);
      color: var(--text-dim);
      cursor: not-allowed;
    }

    /* ===== Status ===== */
    #statusBox {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    #statusBox.visible { display: block; }

    .status-line {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.88rem;
      color: var(--text);
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #statusMsg { flex: 1; }
    #progressPct {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent-h);
      min-width: 2.8rem;
      text-align: right;
    }

    .progress-bar-wrap {
      margin-top: 0.6rem;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent-g);
      border-radius: 2px;
      width: 0%;
      transition: width 0.35s ease;
    }
    .progress-bar.indeterminate {
      width: 30% !important;
      animation: indeterminate 1.4s ease infinite;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(430%); }
    }

    /* ===== Result Panel ===== */
    #resultBox {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    #resultBox.visible { display: block; }

    .result-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      gap: 0.5rem;
    }
    .result-toolbar span {
      font-size: 0.78rem;
      color: var(--text-dim);
      flex: 1;
    }
    .result-toolbar button {
      background: var(--accent-g);
      border: none;
      color: #fff;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .result-toolbar button:hover { opacity: 0.85; }
    .copy-done { background: var(--success) !important; }

    #resultContent {
      padding: 1.25rem;
      max-height: 65vh;
      overflow-y: auto;
      word-break: break-word;
      font-size: 0.9rem;
      line-height: 1.8;
      color: var(--text);
    }
    #resultContent h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-h);
      margin: 1.2rem 0 0.4rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }
    #resultContent h3:first-child { margin-top: 0; }
    #resultContent ul {
      padding-left: 1.2rem;
      margin: 0.3rem 0;
    }
    #resultContent li {
      margin: 0.25rem 0;
      line-height: 1.7;
    }
    #resultContent p {
      margin: 0.4rem 0;
    }

    /* ===== Error ===== */
    #errorBox {
      display: none;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      color: var(--error);
      font-size: 0.88rem;
      line-height: 1.6;
    }
    #errorBox.visible { display: block; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success);
      color: #000;
      padding: 0.6rem 1.5rem;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ===== Thumbnail Preview ===== */
    #thumbnail {
      display: none;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    #thumbnail.visible { display: block; }
    #thumbnail img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 10px;
      opacity: 0.7;
    }
    #thumbnail .thumb-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem 0.75rem 0.6rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      font-size: 0.8rem;
      color: #fff;
      border-radius: 0 0 10px 10px;
    }

    /* ===== Wake-up overlay ===== */
    #wakeOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    #wakeOverlay.visible { display: flex; }
    #wakeOverlay .wake-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    #wakeOverlay p {
      color: var(--text-dim);
      font-size: 0.9rem;
      text-align: center;
      max-width: 280px;
    }

    /* ===== Button loading state ===== */
    button#submitBtn.loading {
      position: relative;
      color: transparent;
    }
    button#submitBtn.loading::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      top: 50%; left: 50%;
      margin: -10px 0 0 -10px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      padding: 2rem 0 0.5rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      opacity: 0.5;
    }

    /* ===== Scrollbar ===== */
    #resultContent::-webkit-scrollbar { width: 5px; }
    #resultContent::-webkit-scrollbar-track { background: transparent; }
    #resultContent::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== Mobile ===== */
    .drop-mobile { display: none; }
    .drop-desktop { display: inline; }

    @media (max-width: 600px) {
      body { padding: 0.75rem 0.5rem 2rem; }
      .card { padding: 1rem; }
      .options-row { flex-direction: column; }
      .seg-group { min-width: 0; }
      .seg-group label span { padding: 0.65rem 0.5rem; font-size: 0.88rem; }
      .source-tab { padding: 0.65rem 0.8rem; font-size: 0.88rem; }
      button#submitBtn { padding: 1rem; font-size: 1.05rem; border-radius: 14px; }
      .drop-zone { padding: 2.5rem 1rem; }
      #urlPanel input { padding: 0.85rem 1rem; font-size: 1rem; }
      header h1 { font-size: 1.4rem; }
      .result-toolbar { flex-wrap: wrap; padding: 0.5rem 0.75rem; }
      .result-toolbar button { padding: 0.5rem 1rem; font-size: 0.88rem; flex: 1; text-align: center; }
      #resultContent { padding: 1rem; font-size: 0.88rem; max-height: 60vh; -webkit-overflow-scrolling: touch; }
      .drop-mobile { display: inline; }
      .drop-desktop { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">&#9654;</div>
        <h1>YouTube Summarizer</h1>
      </div>
      <p>YouTube動画の文字起こし・要約をワンクリックで</p>
    </header>

    <div class="card">
      <div class="source-tabs">
        <div class="source-tab active" data-tab="url">&#128279; YouTube URL</div>
        <div class="source-tab" data-tab="file">&#127925; Audio File</div>
      </div>

      <div id="urlPanel">
        <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" spellcheck="false" />
        <div id="thumbnail"><img id="thumbImg" src="" alt="" /><div class="thumb-title" id="thumbTitle"></div></div>
      </div>

      <div id="filePanel">
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept="audio/*,video/*,.mp3,.wav,.m4a,.ogg,.flac,.aac,.opus,.mp4,.webm,.mkv,.mov" />
          <div class="drop-zone-icon">&#127925;</div>
          <div class="drop-zone-label">
            <strong class="drop-desktop">&#12489;&#12521;&#12483;&#12464;&#65286;&#12489;&#12525;&#12483;&#12503;</strong><span class="drop-desktop">&#12289;&#12414;&#12383;&#12399;&#12463;&#12522;&#12483;&#12463;&#12375;&#12390;&#36984;&#25246;</span>
            <strong class="drop-mobile">&#12479;&#12483;&#12503;&#12375;&#12390;&#12501;&#12449;&#12452;&#12523;&#12434;&#36984;&#25246;</strong><br>
            <small style="color:var(--text-dim);font-size:0.75rem;">MP3 / WAV / M4A / FLAC / MP4 / WebM</small>
          </div>
        </div>
        <div id="fileInfo">
          <span class="file-name" id="fileName"></span>
          <span class="file-size" id="fileSize"></span>
          <button class="file-clear" id="fileClearBtn" title="Remove">&#10005;</button>
        </div>
      </div>

      <div class="options-row">
        <div class="seg-group" title="Output mode">
          <label><input type="radio" name="mode" value="prompt" checked /><span>&#128203; &#35201;&#32004;</span></label>
          <label><input type="radio" name="mode" value="transcript" /><span>&#128221; &#20840;&#25991;</span></label>
        </div>
        <div class="seg-group" title="Output language">
          <label><input type="radio" name="language" value="auto" checked /><span>&#127760; Auto</span></label>
          <label><input type="radio" name="language" value="ja" /><span>&#127471;&#127477; JP</span></label>
          <label><input type="radio" name="language" value="en" /><span>&#127482;&#127480; EN</span></label>
        </div>
      </div>

      <div class="api-key-section">
        <input type="password" id="groqKeyInput" placeholder="Groq API Key (gsk_...)" autocomplete="off" spellcheck="false" />
        <span class="api-key-hint">&#128274; &#12461;&#12540;&#12399;&#12502;&#12521;&#12454;&#12470;&#12395;&#12398;&#12415;&#20445;&#23384;&#65288;&#12469;&#12540;&#12496;&#12540;&#12395;&#12399;&#36865;&#20449;&#12373;&#12428;&#12414;&#12379;&#12435;&#65289;</span>
      </div>

      <button id="submitBtn">&#9889; Generate</button>
    </div>

    <div id="statusBox">
      <div class="status-line">
        <div class="spinner"></div>
        <span id="statusMsg">Starting...</span>
        <span id="progressPct"></span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar indeterminate" id="progressBar"></div>
      </div>
    </div>

    <div id="errorBox"></div>

    <div id="resultBox">
      <div class="result-toolbar">
        <span id="resultLabel">Result</span>
        <button id="copyBtn">&#128203; Copy</button>
      </div>
      <div id="resultContent"></div>
    </div>

    <footer>Powered by Groq &middot; Supadata &middot; youtube-transcript-api</footer>
  </div>

  <div class="toast" id="toast">Copied!</div>
  <div id="wakeOverlay"><div class="wake-spinner"></div><p>サーバーを起動中...<br><small style="opacity:0.6">無料プランのため初回アクセスに時間がかかります</small></p></div>

  <script>
    const urlInput      = document.getElementById('urlInput');
    const submitBtn     = document.getElementById('submitBtn');
    const statusBox     = document.getElementById('statusBox');
    const statusMsg     = document.getElementById('statusMsg');
    const progressBar   = document.getElementById('progressBar');
    const progressPct   = document.getElementById('progressPct');
    const errorBox      = document.getElementById('errorBox');
    const resultBox     = document.getElementById('resultBox');
    const resultContent = document.getElementById('resultContent');
    const resultLabel   = document.getElementById('resultLabel');
    const copyBtn       = document.getElementById('copyBtn');
    const dropZone      = document.getElementById('dropZone');
    const fileInput     = document.getElementById('fileInput');
    const fileInfo      = document.getElementById('fileInfo');
    const fileName      = document.getElementById('fileName');
    const fileSize      = document.getElementById('fileSize');
    const fileClearBtn  = document.getElementById('fileClearBtn');
    const urlPanel      = document.getElementById('urlPanel');
    const filePanel     = document.getElementById('filePanel');
    const sourceTabs    = document.querySelectorAll('.source-tab');
    const groqKeyInput  = document.getElementById('groqKeyInput');
    const toast         = document.getElementById('toast');
    const thumbnail     = document.getElementById('thumbnail');
    const thumbImg      = document.getElementById('thumbImg');
    const thumbTitle    = document.getElementById('thumbTitle');
    const wakeOverlay   = document.getElementById('wakeOverlay');

    let currentRawText = '';
    let selectedFile   = null;
    let activeTab      = 'url';

    // ===== Server wake-up check =====
    (async function checkServer() {
      try {
        const r = await fetch('/health', { signal: AbortSignal.timeout(5000) });
        if (r.ok) return; // server is awake
      } catch {}
      // Server sleeping - show overlay and poll
      wakeOverlay.classList.add('visible');
      for (let i = 0; i < 30; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const r = await fetch('/health', { signal: AbortSignal.timeout(5000) });
          if (r.ok) { wakeOverlay.classList.remove('visible'); return; }
        } catch {}
      }
      wakeOverlay.classList.remove('visible');
    })();

    // Restore
    groqKeyInput.value = localStorage.getItem('groq_api_key') || '';
    groqKeyInput.addEventListener('input', () => {
      localStorage.setItem('groq_api_key', groqKeyInput.value.trim());
    });

    // ===== Thumbnail preview =====
    function extractVideoId(url) {
      const m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }
    let thumbDebounce = null;
    urlInput.addEventListener('input', () => {
      clearTimeout(thumbDebounce);
      thumbDebounce = setTimeout(() => {
        const vid = extractVideoId(urlInput.value.trim());
        if (vid) {
          thumbImg.src = 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg';
          thumbImg.onerror = () => thumbnail.classList.remove('visible');
          thumbnail.classList.add('visible');
          thumbTitle.textContent = '';
        } else {
          thumbnail.classList.remove('visible');
        }
      }, 300);
    });

    // Helpers
    function getMode()     { return document.querySelector('input[name="mode"]:checked').value; }
    function getLanguage() { return document.querySelector('input[name="language"]:checked').value; }
    function fmtSize(b)    { return b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Tab switching
    sourceTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        activeTab = tab.dataset.tab;
        sourceTabs.forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
        urlPanel.style.display = activeTab === 'url' ? '' : 'none';
        filePanel.classList.toggle('active', activeTab === 'file');
      });
    });

    // Drag & Drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setSelectedFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) setSelectedFile(fileInput.files[0]); });

    function setSelectedFile(f) {
      selectedFile = f;
      fileName.textContent = f.name;
      fileSize.textContent = fmtSize(f.size);
      fileInfo.classList.add('visible');
    }
    fileClearBtn.addEventListener('click', () => {
      selectedFile = null; fileInput.value = ''; fileInfo.classList.remove('visible');
    });

    // Status / Result / Error
    function setProgress(v) {
      if (v < 0) {
        progressBar.classList.add('indeterminate'); progressBar.style.width = ''; progressPct.textContent = '';
      } else {
        progressBar.classList.remove('indeterminate'); progressBar.style.width = v+'%'; progressPct.textContent = v+'%';
      }
    }
    function setStatus(msg) { statusMsg.textContent = msg; }
    function showStatus(msg) {
      statusBox.classList.add('visible'); errorBox.classList.remove('visible'); resultBox.classList.remove('visible');
      setProgress(-1); setStatus(msg);
    }
    function showError(msg) {
      statusBox.classList.remove('visible'); errorBox.classList.add('visible');
      errorBox.textContent = msg;
    }

    // Markdown-like rendering
    function renderMarkdown(text) {
      const lines = text.split('\n');
      let html = '';
      let inList = false;

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }
        if (trimmed.startsWith('## ') || trimmed.startsWith('# ')) {
          if (inList) { html += '</ul>'; inList = false; }
          const heading = trimmed.replace(/^#+\s*/, '');
          html += '<h3>' + heading + '</h3>';
        } else if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += '<li>' + trimmed.slice(2) + '</li>';
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          html += '<p>' + trimmed + '</p>';
        }
      }
      if (inList) html += '</ul>';
      return html;
    }

    function showResult(text, mode) {
      statusBox.classList.remove('visible');
      resultBox.classList.add('visible');
      currentRawText = text;

      const chars = text.length.toLocaleString();
      if (mode === 'prompt') {
        resultLabel.textContent = '\u8981\u7d04\u30d7\u30ed\u30f3\u30d7\u30c8 (' + chars + ' chars)';
        resultContent.innerHTML = renderMarkdown(text);
      } else {
        resultLabel.textContent = '\u5168\u6587 (' + chars + ' chars)';
        resultContent.textContent = text;
      }
    }

    // Copy
    copyBtn.addEventListener('click', async () => {
      if (!currentRawText) return;
      try {
        await navigator.clipboard.writeText(currentRawText);
        showToast('\u2705 \u30b3\u30d4\u30fc\u3057\u307e\u3057\u305f');
        copyBtn.classList.add('copy-done');
        setTimeout(() => copyBtn.classList.remove('copy-done'), 2000);
      } catch {
        showToast('\u30b3\u30d4\u30fc\u5931\u6557');
      }
    });

    // SSE reader
    async function readSSE(response, mode) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (!payload) continue;
          let ev;
          try { ev = JSON.parse(payload); } catch { continue; }
          if      (ev.type === 'status')   setStatus(ev.message);
          else if (ev.type === 'progress') setProgress(ev.value);
          else if (ev.type === 'result')   showResult(ev.text, mode);
          else if (ev.type === 'error')    showError(ev.message);
        }
      }
    }

    // Submit
    submitBtn.addEventListener('click', startProcess);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') startProcess(); });

    async function startProcess() {
      const mode = getMode(), language = getLanguage(), groqApiKey = groqKeyInput.value.trim();
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      try {
        if (activeTab === 'url') {
          const url = urlInput.value.trim();
          if (!url) { urlInput.focus(); return; }
          showStatus('\u63a5\u7d9a\u4e2d...');
          const res = await fetch('/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url, mode, language, engine: 'groq', groq_api_key: groqApiKey }),
          });
          if (!res.ok) { const err = await res.json().catch(() => ({ detail: 'Server error' })); throw new Error(err.detail || 'HTTP ' + res.status); }
          await readSSE(res, mode);
        } else {
          if (!selectedFile) { showError('\u30d5\u30a1\u30a4\u30eb\u3092\u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044\u3002'); return; }
          showStatus(selectedFile.name + ' \u3092\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u4e2d...');
          const fd = new FormData();
          fd.append('file', selectedFile); fd.append('mode', mode); fd.append('language', language);
          fd.append('engine', 'groq'); fd.append('groq_api_key', groqApiKey);
          const res = await fetch('/process-file', { method: 'POST', body: fd });
          if (!res.ok) { const err = await res.json().catch(() => ({ detail: 'Server error' })); throw new Error(err.detail || 'HTTP ' + res.status); }
          await readSSE(res, mode);
        }
      } catch (err) {
        showError(err.message || 'Unknown error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
